<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    /* background: #f5f4f0; */
    background: #000000;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1rem;
    color: #1a1a1a;
  }

  .wrap { width: 100%; max-width: 520px; }

  .page { display: none; }
  .page.active { display: block; }

  .page-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #888; margin-bottom: 1.5rem;
  }

  .field { margin-bottom: 10px; }
  .field input {
    width: 100%; height: 44px;
    border: 1px solid #ddd; border-radius: 8px;
    padding: 0 14px;
    font-family: 'Syne', sans-serif; font-size: 14px;
    background: #fff; color: #1a1a1a;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus { border-color: #aaa; }
  .field input::placeholder { color: #bbb; }

  .btn {
    height: 44px; padding: 0 20px;
    border-radius: 8px; border: 1px solid #ddd;
    background: #fff;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 500;
    color: #1a1a1a; cursor: pointer;
    transition: background 0.15s; white-space: nowrap;
  }
  .btn:hover { background: #f0efeb; }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: #1a1a1a; color: #fff; border-color: #1a1a1a;
    width: 100%; margin-top: 6px;
  }
  .btn-primary:hover { background: #333; }

  .switch-link { font-size: 13px; color: #888; margin-top: 1rem; text-align: center; }
  .switch-link span { color: #1a1a1a; font-weight: 500; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }

  .error-msg { font-size: 12px; color: #D85A30; margin-top: 6px; min-height: 18px; }

  .auth-card {
    background: #fff; border: 1px solid #e8e7e3;
    border-radius: 14px; padding: 2rem;
  }

  .auth-logo { font-size: 22px; font-weight: 700; margin-bottom: 1.75rem; letter-spacing: -0.02em; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
  .top-bar .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }

  .user-pill { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; }

  .logout-btn {
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 20px; border: 1px solid #ddd;
    background: transparent; color: #888; cursor: pointer; transition: all 0.15s;
  }
  .logout-btn:hover { border-color: #aaa; color: #1a1a1a; }

  #datePicker {
    height: 40px; margin-bottom: 12px;
    border: 1px solid #ddd; border-radius: 8px; padding: 0 10px;
    font-family: 'Syne', sans-serif; font-size: 13px;
    color: #1a1a1a; background: #fff;
    outline: none; cursor: pointer; display: block;
  }
  #datePicker:focus { border-color: #aaa; }

  .input-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  .input-row input {
    flex: 1; height: 44px;
    border: 1px solid #ddd; border-radius: 8px; padding: 0 14px;
    font-family: 'Syne', sans-serif; font-size: 14px;
    background: #fff; color: #1a1a1a;
    outline: none; transition: border-color 0.15s;
  }
  .input-row input:focus { border-color: #aaa; }
  .input-row input::placeholder { color: #bbb; }

  .cat-row { display: flex; gap: 6px; margin-bottom: 2rem; }
  .cat-btn {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd;
    background: transparent; color: #888; cursor: pointer; transition: all 0.15s;
  }
  .cat-btn.active-task    { background: #CECBF6; color: #3C3489; border-color: #AFA9EC; }
  .cat-btn.active-workout { background: #9FE1CB; color: #085041; border-color: #5DCAA5; }

  .section-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    color: #bbb; margin-bottom: 8px;
  }

  .item-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }

  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 8px;
    border: 1px solid #e8e7e3; background: #fff;
    transition: border-color 0.15s;
  }
  .item:hover { border-color: #ccc; }
  .item.done .item-text { text-decoration: line-through; color: #bbb; }

  .item-check {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid #ccc; background: transparent;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .item.done .item-check { background: #1D9E75; border-color: #1D9E75; }

  .item-check-mark {
    width: 8px; height: 5px;
    border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff;
    transform: rotate(-45deg) translateY(-1px); display: none;
  }
  .item.done .item-check-mark { display: block; }

  .item-text { font-size: 14px; color: #1a1a1a; flex: 1; }

  .item-tag {
    font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 10px; flex-shrink: 0;
  }
  .tag-task    { background: #EEEDFE; color: #534AB7; }
  .tag-workout { background: #E1F5EE; color: #0F6E56; }

  .item-del {
    width: 24px; height: 24px; border: none; background: transparent;
    cursor: pointer; color: #ccc; font-size: 18px; line-height: 1;
    padding: 0; display: flex; align-items: center; justify-content: center;
    border-radius: 4px; opacity: 0; transition: opacity 0.15s, color 0.15s;
  }
  .item:hover .item-del { opacity: 1; }
  .item-del:hover { color: #D85A30; }

  .stats-row { display: flex; gap: 10px; margin-top: 2rem; }
  .stat { flex: 1; background: #edecea; border-radius: 8px; padding: 12px 14px; }
  .stat-val { font-size: 22px; font-weight: 700; color: #1a1a1a; line-height: 1; margin-bottom: 4px; }
  .stat-lbl { font-size: 11px; color: #888; letter-spacing: 0.06em; text-transform: uppercase; }

  .empty { font-size: 13px; color: #bbb; padding: 14px 0; text-align: center; font-style: italic; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Register -->
  <div class="page active" id="page-register">
    <div class="auth-card">
      <div class="auth-logo">Tracker</div>
      <p class="page-label">Create account</p>
      <div class="field"><input id="regEmail" type="email" placeholder="Email"></div>
      <div class="field"><input id="regPass" type="password" placeholder="Password"></div>
      <div class="field"><input id="regPassConfirm" type="password" placeholder="Confirm password"></div>
      <div class="error-msg" id="regError"></div>
      <button class="btn btn-primary" onclick="register()">Create account</button>
      <p class="switch-link">Already have an account? <span onclick="showPage('page-login')">Sign in</span></p>
    </div>
  </div>

  <!-- Login -->
  <div class="page" id="page-login">
    <div class="auth-card">
      <div class="auth-logo">Tracker</div>
      <p class="page-label">Sign in</p>
      <div class="field"><input id="logEmail" type="email" placeholder="Email"></div>
      <div class="field"><input id="logPass" type="password" placeholder="Password"></div>
      <div class="error-msg" id="logError"></div>
      <button class="btn btn-primary" onclick="login()">Sign in</button>
      <p class="switch-link">No account? <span onclick="showPage('page-register')">Register</span></p>
    </div>
  </div>

  <!-- Tracker -->
  <div class="page" id="page-tracker">
    <div class="top-bar">
      <div class="logo">Tracker</div>
      <div class="user-pill">
        <span id="userLabel"></span>
        <button class="logout-btn" onclick="logout()">Log out</button>
      </div>
    </div>

    <input id="datePicker" type="date">

    <div class="input-row">
      <input id="taskInput" placeholder="Add a task or workout…">
      <button class="btn" onclick="addItem()">+ Add</button>
    </div>

    <div class="cat-row">
      <button class="cat-btn active-task" id="btn-task" onclick="setcat('task')">Task</button>
      <button class="cat-btn" id="btn-workout" onclick="setcat('workout')">Workout</button>
    </div>

    <p class="section-label">Tasks</p>
    <ul class="item-list" id="taskList"><li class="empty">No tasks yet</li></ul>

    <p class="section-label">Workouts</p>
    <ul class="item-list" id="workoutList"><li class="empty">No workouts yet</li></ul>

    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">Completed</div></div>
      <div class="stat"><div class="stat-val" id="s-tasks">0</div><div class="stat-lbl">Tasks</div></div>
      <div class="stat"><div class="stat-val" id="s-workouts">0</div><div class="stat-lbl">Workouts</div></div>
    </div>
  </div>

</div>
<script>
  let token = "";
  let cat = "task";
  let items = [];

  // ── Helpers ──
  function today() {
    return new Date().toISOString().split("T")[0];
  }

  function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // ── DOMContentLoaded: safe wiring ──
  document.addEventListener("DOMContentLoaded", () => {
    const picker = document.getElementById("datePicker");
    if (picker) {
      picker.value = today();
      picker.addEventListener("change", () => {
        if (token) loadTasks();
      });
    }

    const input = document.getElementById("taskInput");
    if (input) {
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") addItem();
      });
    }
  });

  // ── Register ──
  async function register() {
    const email = document.getElementById("regEmail").value.trim();
    const pass  = document.getElementById("regPass").value;
    const pass2 = document.getElementById("regPassConfirm").value;
    const err   = document.getElementById("regError");

    if (!email || !pass) { err.textContent = "Please fill in all fields."; return; }
    if (pass !== pass2)  { err.textContent = "Passwords do not match."; return; }
    err.textContent = "";

    try {
      const res = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password: pass })
      });
      if (!res.ok) {
        const d = await res.json();
        err.textContent = d.message || "Registration failed.";
        return;
      }
      showPage("page-login");
      document.getElementById("logEmail").value = email;
    } catch {
      err.textContent = "Could not reach the server.";
    }
  }

  // ── Login ──
  async function login() {
    const email = document.getElementById("logEmail").value.trim();
    const pass  = document.getElementById("logPass").value;
    const err   = document.getElementById("logError");

    if (!email || !pass) { err.textContent = "Please fill in all fields."; return; }
    err.textContent = "";

    try {
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password: pass })
      });
      if (!res.ok) {
        const d = await res.json();
        err.textContent = d.message || "Invalid credentials.";
        return;
      }
      const data = await res.json();
      token = data.token;
      document.getElementById("userLabel").textContent = email;
      document.getElementById("datePicker").value = today();
      showPage("page-tracker");
      loadTasks();
    } catch {
      err.textContent = "Could not reach the server.";
    }
  }

  // ── Logout ──
  function logout() {
    token = "";
    items = [];
    cat = "task";
    render();
    showPage("page-login");
  }

  // ── Load tasks from server ──
  async function loadTasks() {
    try {
      const date = document.getElementById("datePicker").value;
      const res = await fetch(`/tasks?date=${date}`, {
        headers: { Authorization: token }
      });
      if (!res.ok) return;
      const data = await res.json();
      items = data.map(t => ({
        id:   t._id,
        text: t.text,
        cat:  t.cat || "task",
        done: t.done || false
      }));
      render();
    } catch (err) {
      console.error("Failed to load tasks:", err);
    }
  }

  // ── Category selector ──
  function setcat(c) {
    cat = c;
    document.getElementById("btn-task").className    = "cat-btn" + (c === "task"    ? " active-task"    : "");
    document.getElementById("btn-workout").className = "cat-btn" + (c === "workout" ? " active-workout" : "");
  }

  // ── Add item ──
  async function addItem() {
    const inp = document.getElementById("taskInput");
    const val = inp.value.trim();
    if (!val) return;
    const date = document.getElementById("datePicker").value;

    try {
      const res = await fetch("/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: token },
        body: JSON.stringify({ text: val, cat, date })
      });
      if (!res.ok) { console.error("Add failed"); return; }
      const data = await res.json();
      items.push({ id: data._id, text: data.text, cat: data.cat, done: data.done });
      inp.value = "";
      render();
    } catch (err) {
      console.error("Failed to add task:", err);
    }
  }

  // ── Toggle done ──
  async function toggle(id) {
    const it = items.find(i => i.id === id);
    if (it) it.done = !it.done;
    render();
    try {
      await fetch(`/tasks/${id}`, {
        method: "PUT",
        headers: { Authorization: token }
      });
    } catch (err) {
      console.error("Failed to toggle task:", err);
    }
  }

  // ── Delete item ──
  async function del(id) {
    items = items.filter(i => i.id !== id);
    render();
    try {
      await fetch(`/tasks/${id}`, {
        method: "DELETE",
        headers: { Authorization: token }
      });
    } catch (err) {
      console.error("Failed to delete task:", err);
    }
  }

  // ── Render list ──
  function renderList(elId, arr) {
    const ul = document.getElementById(elId);
    if (!arr.length) {
      ul.innerHTML = '<li class="empty">Nothing here yet</li>';
      return;
    }
    ul.innerHTML = arr.map(it => `
      <li class="item${it.done ? " done" : ""}">
        <div class="item-check" onclick="toggle('${it.id}')">
          <div class="item-check-mark"></div>
        </div>
        <span class="item-text">${it.text}</span>
        <span class="item-tag tag-${it.cat}">${it.cat}</span>
        <button class="item-del" onclick="del('${it.id}')" title="Remove">×</button>
      </li>`).join("");
  }

  // ── Render all ──
  function render() {
    const tasks    = items.filter(i => i.cat === "task");
    const workouts = items.filter(i => i.cat === "workout");
    renderList("taskList", tasks);
    renderList("workoutList", workouts);
    document.getElementById("s-done").textContent     = items.filter(i => i.done).length;
    document.getElementById("s-tasks").textContent    = tasks.length;
    document.getElementById("s-workouts").textContent = workouts.length;
  }
</script>
</body>
</html>
