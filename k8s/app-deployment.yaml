apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracker-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tracker-app
  template:
    metadata:
      labels:
        app: tracker-app
    spec:
      containers:
      - name: tracker-app
        image: dhruubb/tracker-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URI
          value: mongodb://mongo:27017/tracker